apiVersion: apps/v1
kind: Deployment
metadata: {name: sw-core, namespace: snmp-targets, labels: {app: sw-core, layer: core}}
spec:
  replicas: 3
  selector: {matchLabels: {app: sw-core}}
  template:
    metadata:
      labels: {app: sw-core, layer: core}
      annotations:
        k8s.v1.cni.cncf.io/networks: net-core
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions: [{key: node-role.kubernetes.io/control-plane, operator: DoesNotExist}]
      topologySpreadConstraints:
        - {maxSkew: 1, topologyKey: kubernetes.io/hostname, whenUnsatisfiable: DoNotSchedule, labelSelector: {matchLabels: {app: sw-core}}}
      containers:
        - name: snmpd
          image: ghcr.io/drmsantos/vivo-snmpd:latest
          imagePullPolicy: Always
          volumeMounts: [{name: config, mountPath: /etc/snmp/snmpd.conf, subPath: snmpd.conf}]
          resources: {requests: {memory: "64Mi", cpu: "50m"}, limits: {memory: "128Mi", cpu: "200m"}}
      volumes: [{name: config, configMap: {name: snmpd-core}}]
---
