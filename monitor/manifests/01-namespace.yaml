  config: '{"cniVersion":"0.3.1","name":"net-oam","type":"macvlan","master":"eth0","mode":"bridge","ipam":{"type":"host-local","subnet":"172.20.4.0/24","rangeStart":"172.20.4.100","rangeEnd":"172.20.4.200","gateway":"172.20.4.1"}}'
