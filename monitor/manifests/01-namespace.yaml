# Autor: Diego Regis M. F. dos Santos | diego-f-santos@openlabs.com.br
# Time: OpenLabs - DevOps | Infra | Versão: 2.2
# Nota: NADs do snmp-monitor usam range 100-200 para não conflitar com snmp-targets (10-90)
apiVersion: v1
kind: Namespace
metadata:
  name: snmp-monitor
  labels:
    app.kubernetes.io/part-of: vivo-snmp-prod
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata: {name: net-core, namespace: snmp-monitor}
spec:
  config: '{"cniVersion":"0.3.1","name":"net-core","type":"macvlan","master":"eth0","mode":"bridge","ipam":{"type":"host-local","subnet":"172.20.1.0/24","rangeStart":"172.20.1.100","rangeEnd":"172.20.1.200","gateway":"172.20.1.1"}}'
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata: {name: net-pe, namespace: snmp-monitor}
spec:
  config: '{"cniVersion":"0.3.1","name":"net-pe","type":"macvlan","master":"eth0","mode":"bridge","ipam":{"type":"host-local","subnet":"172.20.2.0/24","rangeStart":"172.20.2.100","rangeEnd":"172.20.2.200","gateway":"172.20.2.1"}}'
---
