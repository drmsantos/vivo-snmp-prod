# Autor: Diego Regis M. F. dos Santos | diego-f-santos@openlabs.com.br
# Time: OpenLabs - DevOps | Infra | Versão: 2.2
# Desc: Switches simulados — snmpd escuta em 0.0.0.0:161 (porta privilegiada)
#       Em produção substituir pelos IPs reais no switches.csv do Telegraf
apiVersion: v1
kind: ConfigMap
metadata: {name: snmpd-core, namespace: snmp-targets}
data:
  snmpd.conf: |
    agentAddress udp:0.0.0.0:161
    rocommunity public 0.0.0.0/0
    sysDescr Nokia 7750 SR OS 22.10.R3, Copyright Nokia. All rights reserved.
    sysContact noc-vivo@telefonica.com
    extend cpuUsage    /bin/sh -c "echo $((RANDOM % 40 + 5))"
    extend memUsage    /bin/sh -c "echo $((RANDOM % 30 + 20))"
    view all included .1
    access notConfigGroup "" any noauth exact all all none
---
