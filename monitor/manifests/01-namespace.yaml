spec:
  config: '{"cniVersion":"0.3.1","name":"net-transport","type":"macvlan","master":"eth0","mode":"bridge","ipam":{"type":"host-local","subnet":"172.20.5.0/24","rangeStart":"172.20.5.100","rangeEnd":"172.20.5.200","gateway":"172.20.5.1"}}'
